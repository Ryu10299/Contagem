<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>D.W</title>

<link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

<style>

body{
    background:black;
    color:#5b0000;
    font-family:'Special Elite', monospace;
    text-align:center;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    height:100vh;
}

#contadorPrincipal{
    font-size:65px;
    margin-bottom:20px;
}

#contadorSecundario{
    font-size:28px;
    margin-top:20px;
}

.frase{
    font-size:22px;
    margin-top:10px;
}

.frase2{
    font-size:18px;
    margin-top:10px;
}

img{
    width:120px;
    margin-top:20px;
    animation:girar 8s linear infinite;
}

@keyframes girar{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(720deg);}
}

</style>
</head>

<body>

<div id="contadorPrincipal"></div>

<div class="frase">
Sr. Verissimo está em reunião agora !! espere um pouco por favor
</div>

<div id="contadorSecundario"></div>

<div id="textoEpisodio" class="frase2">
Episódio 1 de D.W ( campanha Pré Ordem )
</div>

<img src="simbolo.png">

<script>

const dataPrincipal = new Date("May 3, 2026 14:00:00").getTime();
const dataSecundaria = new Date("March 22, 2026 14:00:00").getTime();

const contadorPrincipal = document.getElementById("contadorPrincipal");
const contadorSecundario = document.getElementById("contadorSecundario");
const textoEpisodio = document.getElementById("textoEpisodio");

setInterval(function(){

let agora = new Date().getTime();

let tempo1 = dataPrincipal - agora;
let tempo2 = dataSecundaria - agora;

/* CONTADOR PRINCIPAL */

let dias = Math.floor(tempo1/(1000*60*60*24));
let horas = Math.floor((tempo1%(1000*60*60*24))/(1000*60*60));
let minutos = Math.floor((tempo1%(1000*60*60))/(1000*60));
let segundos = Math.floor((tempo1%(1000*60))/1000);

contadorPrincipal.innerHTML =
dias+" dias "+horas+" horas "+minutos+" min "+segundos+" s";

/* CONTADOR SECUNDARIO */

if(tempo2 > 0){

let dias2 = Math.floor(tempo2/(1000*60*60*24));
let horas2 = Math.floor((tempo2%(1000*60*60*24))/(1000*60*60));
let segundos2 = Math.floor((tempo2%(1000*60))/1000);

contadorSecundario.innerHTML =
dias2+" dias "+horas2+" horas "+segundos2+" s";

}else{

contadorSecundario.innerHTML="";
textoEpisodio.innerHTML=
"Vá para o Youtube da pagina para ver o Episódio 1 de D.W";

}

},1000);

</script>

</body>
</html>
