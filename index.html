<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Contagem</title>

<style>
body{
    background:#000;
    color:#5b0000;
    font-family:Arial, Helvetica, sans-serif;
    text-align:center;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    flex-direction:column;
}

#contador1{
    font-size:60px;
    margin-bottom:20px;
}

#contador2{
    font-size:28px;
    margin-top:20px;
}

.frase{
    font-size:22px;
    margin-top:10px;
}

.frase2{
    font-size:18px;
    margin-top:10px;
}

img{
    margin-top:20px;
    width:120px;
    animation:girar 6s linear infinite;
}

@keyframes girar{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(720deg);}
}
</style>
</head>

<body>

<div id="contador1"></div>

<div class="frase">
Sr. Verissimo está em reunião agora !! espere um pouco por favor
</div>

<div id="contador2"></div>

<div id="episodio" class="frase2">
Episódio 0,1 de D.W ( campanha Pré Ordem )
</div>

<img src="simbolo.png">

<script>

const alvo1 = new Date("May 03, 2026 14:00:00").getTime();
const alvo2 = new Date("March 22, 2026 14:00:00").getTime();

const contador1 = document.getElementById("contador1");
const contador2 = document.getElementById("contador2");
const episodio = document.getElementById("episodio");

setInterval(function(){

let agora = new Date().getTime();

let dist1 = alvo1 - agora;
let dist2 = alvo2 - agora;

let d = Math.floor(dist1/(1000*60*60*24));
let h = Math.floor((dist1%(1000*60*60*24))/(1000*60*60));
let m = Math.floor((dist1%(1000*60*60))/(1000*60));
let s = Math.floor((dist1%(1000*60))/1000);

contador1.innerHTML = d+"d "+h+"h "+m+"m "+s+"s";

if(dist2 > 0){

let h2 = Math.floor((dist2%(1000*60*60*24))/(1000*60*60));
let m2 = Math.floor((dist2%(1000*60*60))/(1000*60));
let s2 = Math.floor((dist2%(1000*60))/1000);

contador2.innerHTML = h2+"h "+m2+"m "+s2+"s";

}else{

contador2.innerHTML = "";
episodio.innerHTML = "Vá para o Youtube da pagina para ver o Episódio 1 de D.W";

}

},1000);

</script>

</body>
</html>
