<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Protocolo : Ruína</title>

<style>

body{
background:black;
margin:0;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
font-family:Courier New, monospace;
}

.container{
text-align:center;
z-index:2;
}

.neonRed{
color:#8b0000;
text-shadow:
0 0 5px #ff0000,
0 0 10px #ff0000,
0 0 20px #ff0000,
0 0 40px #ff0000;
}

.neonGreen{
color:#006400;
text-shadow:
0 0 5px #00ff00,
0 0 10px #00ff00,
0 0 20px #00ff00,
0 0 40px #00ff00;
}

#contador{
font-size:60px;
margin-bottom:20px;
}

#contador2{
font-size:32px;
margin-top:20px;
}

.frasePiscando{
font-size:24px;
margin-top:10px;
animation:piscando 5s infinite;
}

@keyframes piscando{
0%{opacity:1}
50%{opacity:0}
100%{opacity:1}
}

#simbolo{
position:absolute;
width:300px;
opacity:0.4;
animation:girar 60s linear infinite;
filter:brightness(130%);
}

@keyframes girar{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}

.fraseRicardo{
position:absolute;
font-size:22px;
color:#8b0000;
text-shadow:0 0 10px red;
pointer-events:none;
}

#eventoHora{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:40px;
display:none;
text-align:center;
}

</style>
</head>

<body>

<img id="simbolo" src="simbolo.png">

<div class="container">

<div id="contador" class="neonRed"></div>

<div class="frasePiscando neonRed">
O Verissimo ainda não chegou, espere um pouco
</div>

<div id="contador2" class="neonRed"></div>

<div class="frasePiscando neonRed">
Revelando Agentes
</div>

</div>

<div id="eventoHora" class="neonGreen">
Ele trouxe o Outro Lado pra cá
</div>

<script>

// DATA DO RPG
const dataRPG = new Date("May 3, 2026 14:00:00").getTime()

// DATA AGENTES
const dataAgentes = new Date("March 14, 2026 18:00:00").getTime()

function atualizarContador(){

let agora = new Date().getTime()

let distancia = dataRPG - agora

let dias = Math.floor(distancia/(1000*60*60*24))
let horas = Math.floor((distancia%(1000*60*60*24))/(1000*60*60))
let minutos = Math.floor((distancia%(1000*60*60))/(1000*60))
let segundos = Math.floor((distancia%(1000*60))/1000)

document.getElementById("contador").innerHTML =
dias+"d "+horas+"h "+minutos+"m "+segundos+"s"

let dist2 = dataAgentes - agora

let dias2 = Math.floor(dist2/(1000*60*60*24))
let horas2 = Math.floor((dist2%(1000*60*60*24))/(1000*60*60))
let minutos2 = Math.floor((dist2%(1000*60*60))/(1000*60))
let segundos2 = Math.floor((dist2%(1000*60))/1000)

document.getElementById("contador2").innerHTML =
dias2+"d "+horas2+"h "+minutos2+"m "+segundos2+"s"

}

setInterval(atualizarContador,1000)


// FRASES DO RICARDO

const frases = [
"O que era aquilo?",
"Você ta ai Mathias ?",
"O que ele faz aqui ?",
"Que porra é aquela",
"Vamos mais a fundo cara"
]

let index=0

function spawnFrase(){

let frase=document.createElement("div")
frase.className="fraseRicardo"
frase.innerText=frases[index]

let x=Math.random()*window.innerWidth
let y=Math.random()*window.innerHeight

if(y>window.innerHeight/2-150 && y<window.innerHeight/2+150){
y+=200
}

frase.style.left=x+"px"
frase.style.top=y+"px"

document.body.appendChild(frase)

setTimeout(()=>{
frase.remove()
},1500)

index++
if(index>=frases.length){index=0}

}

setInterval(spawnFrase,15000)


// EVENTO HORA CHEIA

let ultimaHora = new Date().getHours()

setInterval(()=>{

let agora = new Date()
let hora = agora.getHours()

if(hora != ultimaHora && agora.getMinutes()==0){

ultimaHora=hora

document.querySelector(".container").style.display="none"
document.getElementById("simbolo").style.display="none"

let evento=document.getElementById("eventoHora")

evento.style.display="block"

setTimeout(()=>{

evento.style.display="none"

document.querySelector(".container").style.display="block"
document.getElementById("simbolo").style.display="block"

},15000)

}

},1000)

</script>

</body>
</html>
