<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Protocolo : Ruína</title>

<style>

body{
background:black;
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:"Courier New", monospace;
overflow:hidden;
}

.container{
text-align:center;
color:#6b0000;
filter:brightness(1.3);
}

#contador{
font-size:60px;
margin-bottom:20px;
}

#contador2{
font-size:36px;
margin-top:40px;
}

.frase{
font-size:24px;
margin-top:10px;
}

.frase2{
font-size:24px;
margin-top:15px;
}

#simbolo{
width:130px;
margin-top:30px;
opacity:0.5;
animation:girar 32s linear infinite;
}

@keyframes girar{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

#eventoHora{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:38px;
color:#004b00;
font-family:"Courier New", monospace;
display:none;
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<div id="contador"></div>

<div class="frase">
O Verissimo ainda não chegou, espere um pouco
</div>

<div id="contador2"></div>

<div class="frase2">
Revelando Agentes
</div>

<img id="simbolo" src="simbolo.png">

</div>

<div id="eventoHora">
Ele trouxe o Outro Lado pra cá
</div>

<script>

const dataRPG = new Date("May 3, 2026 14:00:00").getTime()
const dataAgentes = new Date("March 14, 2026 18:00:00").getTime()

function atualizarContadores(){

let agora = new Date().getTime()

let distancia = dataRPG - agora

let dias = Math.floor(distancia/(1000*60*60*24))
let horas = Math.floor((distancia%(1000*60*60*24))/(1000*60*60))
let minutos = Math.floor((distancia%(1000*60*60))/(1000*60))
let segundos = Math.floor((distancia%(1000*60))/1000)

document.getElementById("contador").innerHTML =
dias+"d "+horas+"h "+minutos+"m "+segundos+"s"


let dist2 = dataAgentes - agora

let dias2 = Math.floor(dist2/(1000*60*60*24))
let horas2 = Math.floor((dist2%(1000*60*60*24))/(1000*60*60))
let minutos2 = Math.floor((dist2%(1000*60*60))/(1000*60))
let segundos2 = Math.floor((dist2%(1000*60))/1000)

document.getElementById("contador2").innerHTML =
dias2+"d "+horas2+"h "+minutos2+"m "+segundos2+"s"

}

setInterval(atualizarContadores,1000)



let ultimaHora = new Date().getHours()

setInterval(()=>{

let agora = new Date()

if(
agora.getHours()!=ultimaHora &&
agora.getMinutes()==0
){

ultimaHora=agora.getHours()

document.querySelector(".container").style.display="none"

let evento=document.getElementById("eventoHora")

evento.style.display="block"

setTimeout(()=>{

evento.style.display="none"
document.querySelector(".container").style.display="block"

},15000)

}

},1000)

</script>

</body>
</html>
