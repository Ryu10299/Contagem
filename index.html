<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Contagem</title>

<link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

<style>

body{
    background:black;
    color:#6b0000;
    font-family:'Special Elite', monospace;
    text-align:center;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    flex-direction:column;
}

#contador1{
    font-size:60px;
    margin-bottom:20px;
}

.frase{
    font-size:22px;
    margin-bottom:40px;
}

#contador2{
    font-size:28px;
}

.frase2{
    font-size:18px;
    margin-top:10px;
}

img{
    width:120px;
    margin-top:20px;
    animation:girar 6s linear infinite;
}

@keyframes girar{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(720deg);}
}

</style>
</head>

<body>

<div id="contador1"></div>

<div class="frase">
Sr. Verissimo está em reunião agora !! espere um pouco por favor
</div>

<div id="contador2"></div>

<div id="episodio" class="frase2">
Episódio 1 de D.W ( campanha Pré Ordem )
</div>

<img src="simbolo.png">

<script>

const alvoPrincipal = new Date("May 03, 2026 14:00:00").getTime();
const alvoEpisodio = new Date("March 22, 2026 14:00:00").getTime();

const contador1 = document.getElementById("contador1");
const contador2 = document.getElementById("contador2");
const episodio = document.getElementById("episodio");

setInterval(function(){

let agora = new Date().getTime();

let distancia1 = alvoPrincipal - agora;
let distancia2 = alvoEpisodio - agora;

let dias1 = Math.floor(distancia1/(1000*60*60*24));
let horas1 = Math.floor((distancia1%(1000*60*60*24))/(1000*60*60));
let segundos1 = Math.floor((distancia1%(1000*60))/1000);

contador1.innerHTML = dias1+" dias "+horas1+" horas "+segundos1+" segundos";

if(distancia2 > 0){

let dias2 = Math.floor(distancia2/(1000*60*60*24));
let horas2 = Math.floor((distancia2%(1000*60*60*24))/(1000*60*60));
let segundos2 = Math.floor((distancia2%(1000*60))/1000);

contador2.innerHTML = dias2+" dias "+horas2+" horas "+segundos2+" segundos";

}else{

contador2.innerHTML = "";
episodio.innerHTML = "Vá para o Youtube da pagina para ver o Episódio 1 de D.W";

}

},1000);

</script>

</body>
</html>
