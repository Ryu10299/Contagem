<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Protocolo : Ruína</title>

<style>

body{
background:black;
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
font-family: "Courier New", monospace;
color:#6b0000;
overflow:hidden;
}

.container{
text-align:center;
z-index:2;
}

#contador{
font-size:60px;
margin-bottom:20px;
color:#7a0000;
}

#contador2{
font-size:32px;
margin-top:30px;
color:#7a0000;
}

.frase{
font-size:22px;
margin-top:10px;
color:#7a0000;
}

.piscando{
animation:piscando 5s infinite;
}

@keyframes piscando{
0%{opacity:1}
50%{opacity:0}
100%{opacity:1}
}

#simbolo{
position:absolute;
width:260px;
opacity:0.35;
animation:girar 80s linear infinite;
filter:brightness(130%);
}

@keyframes girar{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}

.fraseRicardo{
position:absolute;
font-size:20px;
color:#7a0000;
pointer-events:none;
}

#eventoHora{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:36px;
display:none;
color:#006400;
font-family:Courier New, monospace;
}

</style>
</head>

<body>

<img id="simbolo" src="simbolo.png">

<div class="container">

<div id="contador"></div>

<div class="frase piscando">
O Verissimo ainda não chegou, espere um pouco
</div>

<div id="contador2"></div>

<div class="frase piscando">
Revelando Agentes
</div>

</div>

<div id="eventoHora">
Ele trouxe o Outro Lado pra cá
</div>

<script>

const dataRPG = new Date("May 3, 2026 14:00:00").getTime()
const dataAgentes = new Date("March 14, 2026 18:00:00").getTime()

function atualizar(){

let agora = new Date().getTime()

let dist = dataRPG - agora

let d = Math.floor(dist/(1000*60*60*24))
let h = Math.floor((dist%(1000*60*60*24))/(1000*60*60))
let m = Math.floor((dist%(1000*60*60))/(1000*60))
let s = Math.floor((dist%(1000*60))/1000)

contador.innerHTML = d+"d "+h+"h "+m+"m "+s+"s"

let dist2 = dataAgentes - agora

let d2 = Math.floor(dist2/(1000*60*60*24))
let h2 = Math.floor((dist2%(1000*60*60*24))/(1000*60*60))
let m2 = Math.floor((dist2%(1000*60*60))/(1000*60))
let s2 = Math.floor((dist2%(1000*60))/1000)

contador2.innerHTML = d2+"d "+h2+"h "+m2+"m "+s2+"s"

}

setInterval(atualizar,1000)


// FRASES DO RICARDO

const frases = [
"O que era aquilo?",
"Você ta ai Mathias ?",
"O que ele faz aqui ?",
"Que porra é aquela",
"Vamos mais a fundo cara"
]

let index=0

function spawnFrase(){

let frase = document.createElement("div")
frase.className="fraseRicardo"
frase.innerText = frases[index]

// limita posição para não aparecer no centro

let x
let y

do{

x = Math.random()*window.innerWidth
y = Math.random()*window.innerHeight

}while(
x > window.innerWidth*0.3 &&
x < window.innerWidth*0.7 &&
y > window.innerHeight*0.3 &&
y < window.innerHeight*0.7
)

frase.style.left = x+"px"
frase.style.top = y+"px"

document.body.appendChild(frase)

setTimeout(()=>{
frase.remove()
},1500)

index++

if(index >= frases.length){
index = 0
}

}

setInterval(spawnFrase,15000)


// EVENTO HORA CHEIA

let ultimaHora = new Date().getHours()

setInterval(()=>{

let agora = new Date()

if(
agora.getHours() != ultimaHora &&
agora.getMinutes()==0
){

ultimaHora = agora.getHours()

document.querySelector(".container").style.display="none"
simbolo.style.display="none"

eventoHora.style.display="block"

setTimeout(()=>{

eventoHora.style.display="none"
document.querySelector(".container").style.display="block"
simbolo.style.display="block"

},15000)

}

},1000)

</script>

</body>
</html>
